name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Compile source files
      - name: Compile Java Source
        run: |
          mkdir Assignment2\Task3\out\production\Task3
          javac -d Assignment2\Task3\out\production\Task3 $(Get-ChildItem -Recurse -Filter *.java Assignment2\Task3\src | ForEach-Object {$_.FullName})

      # Download JaCoCo
      - name: Download JaCoCo
        run: |
          curl -L https://repo1.maven.org/maven2/org/jacoco/jacoco/0.8.11/jacoco-0.8.11.zip -o jacoco.zip
          tar -xf jacoco.zip

      # Generate coverage report
      - name: Generate JaCoCo XML
        run: |
          mkdir coverage
          java -jar jacoco/lib/jacococli.jar report jacoco.exec `
          --classfiles Assignment2\Task3\out\production\Task3 `
          --sourcefiles Assignment2\Task3\src `
          --xml coverage\jacoco.xml

      # SonarCloud scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
