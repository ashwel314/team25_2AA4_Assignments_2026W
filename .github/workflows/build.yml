name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compile Java Source (exclude tests)
        run: |
          New-Item -ItemType Directory -Force -Path Assignment2\Task3\out\production\Task3
          javac -d Assignment2\Task3\out\production\Task3 (Get-ChildItem -Recurse -Filter *.java Assignment2\Task3\src | Where-Object { $_.Name -notlike "*Test.java" }).FullName

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
